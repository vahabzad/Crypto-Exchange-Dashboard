<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Crypto Trading Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body{
      font-family:Inter;
    }

    .scroll::-webkit-scrollbar{
      width:6px;
    }

    .scroll::-webkit-scrollbar-thumb{
      background:#555;
      border-radius:10px;
    }

  </style>
</head>

<body class="bg-zinc-950 text-zinc-200">

<!-- NAVBAR -->

<div class="h-12 border-b border-zinc-800 flex items-center justify-between px-4">

  <div class="flex items-center gap-4">

    <div class="font-semibold">
      Crypto Terminal
    </div>

    <select class="bg-zinc-900 border border-zinc-700 px-2 py-1 text-sm">
      <option>BTC/USDT</option>
      <option>ETH/USDT</option>
      <option>SOL/USDT</option>
    </select>

  </div>

  <div class="flex gap-2">

    <button id="langBtn" class="text-sm px-3 py-1 border border-zinc-700">
      FA
    </button>

    <button id="themeBtn" class="text-sm px-3 py-1 border border-zinc-700">
      Theme
    </button>

  </div>

</div>


<!-- MAIN GRID -->

<div class="grid grid-cols-12 gap-2 p-2 h-[calc(100vh-48px)]">

  <!-- WATCHLIST -->

  <div class="col-span-2 bg-zinc-900 border border-zinc-800 flex flex-col">

    <div class="p-2 text-sm border-b border-zinc-800">
      Watchlist
    </div>

    <div id="watchlist" class="flex-1 overflow-y-auto scroll text-xs"></div>

  </div>



  <!-- CHART -->

  <div class="col-span-7 flex flex-col gap-2">

    <div class="bg-zinc-900 border border-zinc-800 h-[60%]">

      <div id="chart" class="w-full h-full"></div>

    </div>


    <!-- POSITIONS -->

    <div class="bg-zinc-900 border border-zinc-800 flex-1">

      <div class="p-2 border-b border-zinc-800 text-sm">
        Positions
      </div>

      <table class="w-full text-xs">

        <thead class="text-zinc-400">
        <tr>
          <th>Pair</th>
          <th>Entry</th>
          <th>Price</th>
          <th>PnL</th>
        </tr>
        </thead>

        <tbody id="positions"></tbody>

      </table>

    </div>

  </div>


  <!-- ORDERBOOK -->

  <div class="col-span-2 bg-zinc-900 border border-zinc-800 flex flex-col">

    <div class="p-2 border-b border-zinc-800 text-sm">
      Order Book
    </div>

    <div id="orderbook" class="flex-1 overflow-y-auto text-xs scroll"></div>

  </div>


  <!-- TRADE PANEL -->

  <div class="col-span-1 bg-zinc-900 border border-zinc-800 flex flex-col">

    <div class="p-2 border-b border-zinc-800 text-sm">
      Trade
    </div>

    <div class="p-2 text-xs flex flex-col gap-2">

      <select class="bg-zinc-800 p-1">
        <option>Market</option>
        <option>Limit</option>
      </select>

      <input placeholder="Amount" class="bg-zinc-800 p-1">

      <input placeholder="Price" class="bg-zinc-800 p-1">

      <button class="bg-green-600 p-1">
        Buy
      </button>

      <button class="bg-red-600 p-1">
        Sell
      </button>

    </div>

  </div>


  <!-- TRADES -->

  <div class="col-span-3 bg-zinc-900 border border-zinc-800 flex flex-col">

    <div class="p-2 border-b border-zinc-800 text-sm">
      Recent Trades
    </div>

    <div id="trades" class="flex-1 overflow-y-auto text-xs scroll"></div>

  </div>


  <!-- NEWS -->

  <div class="col-span-9 bg-zinc-900 border border-zinc-800">

    <div class="p-2 border-b border-zinc-800 text-sm">
      Market News
    </div>

    <div class="p-2 text-xs space-y-2">

      <div>Bitcoin ETF inflows increase</div>
      <div>Ethereum gas fees drop</div>
      <div>Solana ecosystem growth</div>

    </div>

  </div>

</div>



<script>



  // CHART

  const chart = LightweightCharts.createChart(document.getElementById('chart'),{
    layout:{
      background:{color:'#09090b'},
      textColor:'#DDD'
    },
    grid:{
      vertLines:{color:'#222'},
      horzLines:{color:'#222'}
    }
  })

  const candleSeries = chart.addCandlestickSeries()

  let data=[]
  let time=0

  for(let i=0;i<200;i++){

    let open=100+Math.random()*20
    let close=open+(Math.random()*4-2)

    data.push({
      time:time++,
      open,
      high:open+3,
      low:open-3,
      close
    })

  }

  candleSeries.setData(data)



  // WATCHLIST

  const pairs=[
    'BTC/USDT',
    'ETH/USDT',
    'SOL/USDT',
    'BNB/USDT',
    'XRP/USDT',
    'ADA/USDT'
  ]

  const watchlist=document.getElementById('watchlist')

  pairs.forEach(p=>{
    let price=(Math.random()*40000).toFixed(2)

    watchlist.innerHTML+=`
<div class="flex justify-between p-1 border-b border-zinc-800">
<span>${p}</span>
<span>${price}</span>
</div>
`
  })



  // ORDERBOOK

  const ob=document.getElementById('orderbook')

  for(let i=0;i<25;i++){

    let price=(30000+Math.random()*1000).toFixed(2)
    let size=(Math.random()*2).toFixed(3)

    ob.innerHTML+=`
<div class="flex justify-between px-2 py-1 text-red-400">
<span>${price}</span>
<span>${size}</span>
</div>
`
  }

  for(let i=0;i<25;i++){

    let price=(30000-Math.random()*1000).toFixed(2)
    let size=(Math.random()*2).toFixed(3)

    ob.innerHTML+=`
<div class="flex justify-between px-2 py-1 text-green-400">
<span>${price}</span>
<span>${size}</span>
</div>
`
  }



  // TRADES

  const trades=document.getElementById('trades')

  for(let i=0;i<50;i++){

    let price=(30000+Math.random()*500).toFixed(2)
    let size=(Math.random()*1).toFixed(3)

    trades.innerHTML+=`
<div class="flex justify-between px-2 py-1 border-b border-zinc-800">
<span>${price}</span>
<span>${size}</span>
</div>
`
  }



  // POSITIONS

  const pos=document.getElementById('positions')

  pos.innerHTML=`
<tr class="text-center border-t border-zinc-800">
<td>BTCUSDT</td>
<td>29800</td>
<td>30100</td>
<td class="text-green-400">+120</td>
</tr>
`



  // THEME

  const themeBtn=document.getElementById('themeBtn')

  let dark=true

  themeBtn.onclick=()=>{

    dark=!dark

    if(dark){
      document.body.classList.remove("bg-white","text-black")
      document.body.classList.add("bg-zinc-950","text-zinc-200")
    }else{
      document.body.classList.remove("bg-zinc-950","text-zinc-200")
      document.body.classList.add("bg-white","text-black")
    }

  }



  // LANGUAGE RTL

  const langBtn=document.getElementById('langBtn')

  let rtl=false

  langBtn.onclick=()=>{

    rtl=!rtl

    document.documentElement.dir=rtl?"rtl":"ltr"

  }



</script>


</body>
</html>
